<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Directory</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 24px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    header span {
      font-size: 13px;
      color: #888;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 24px;
    }

    .search-bar {
      display: flex;
      align-items: center;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 10px 16px;
      margin-bottom: 24px;
      gap: 10px;
    }

    .search-bar input {
      border: none;
      outline: none;
      font-size: 14px;
      flex: 1;
      background: transparent;
      color: #1a1a1a;
    }

    .search-bar svg { color: #aaa; flex-shrink: 0; }

    .client-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .client-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 20px 22px;
      cursor: pointer;
      transition: box-shadow 0.15s, border-color 0.15s;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .client-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      border-color: #c0c0c0;
    }

    .client-avatar {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: #555;
      margin-bottom: 14px;
    }

    .client-name {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .client-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      background: #f0f0f0;
      color: #666;
      border-radius: 4px;
      padding: 2px 8px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .count {
      font-size: 13px;
      color: #888;
      margin-bottom: 20px;
    }

    .empty {
      text-align: center;
      color: #aaa;
      font-size: 14px;
      padding: 60px 0;
      display: none;
    }
  </style>
</head>
<body>

<header>
  <h1>Client Directory</h1>
  <span id="date"></span>
</header>

<div class="container">

  <div class="search-bar">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="search" placeholder="Search a client…" />
  </div>

  <p class="count" id="count"></p>

  <div class="client-grid" id="grid"></div>
  <p class="empty" id="empty">No clients found.</p>

</div>

<script>
  const clients = [
    { name: "Cambridge Independent", tag: "Press", url: "clients/cambridge-independent/" },
  ];

  const grid = document.getElementById("grid");
  const searchInput = document.getElementById("search");
  const countEl = document.getElementById("count");
  const emptyEl = document.getElementById("empty");

  document.getElementById("date").textContent = new Date().toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" });

  function initials(name) {
    return name.split(" ").map(w => w[0]).slice(0, 2).join("").toUpperCase();
  }

  function render(list) {
    grid.innerHTML = "";
    countEl.textContent = list.length + " client" + (list.length > 1 ? "s" : "") + " found";
    emptyEl.style.display = list.length === 0 ? "block" : "none";

    list.forEach(client => {
      const card = document.createElement("a");
      card.className = "client-card";
      card.href = client.url || "#";
      if (client.url) card.target = "_blank";
      card.innerHTML = `
        <div class="client-avatar">${initials(client.name)}</div>
        <div class="client-name">${client.name}</div>
        <span class="client-tag">${client.tag}</span>
      `;
      grid.appendChild(card);
    });
  }

  searchInput.addEventListener("input", () => {
    const q = searchInput.value.toLowerCase();
    render(clients.filter(c => c.name.toLowerCase().includes(q) || c.tag.toLowerCase().includes(q)));
  });

  render(clients);
</script>

</body>
</html>
